<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Task</title>
    <style>
    .parent{
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(6,1fr);
            grid-template-rows: repeat(3,1fr);
            background-color: black;
            gap: 10px;
    }
    .child1{
        background-color: turquoise;
    }
    .child2{
        background-color: coral;
    }
    .child3{
        background-color: aqua;
    }
    .child4{
        background-color: saddlebrown;
    }
    .child5{
        background-color: aqua;
    }
    .child6{
        background-color: coral;
    }
    .child7{
        background-color: salmon;
    }
    .child8{
        background-color:turquoise;
    }
    .child9{
        background-color: coral;
    }
    .child10{
        background-color: aqua;
    }
    .child11{
        background-color:salmon;
    }
    .child12{
        background-color: saddlebrown;
    }
    .child13{
        background-color: turquoise;
    }
    .child14{
        background-color: saddlebrown;
    }
    .child15{
        background-color: aqua;
    }
    .child16{
        background-color: coral;
    }
    .child17{
        background-color: turquoise;
    }
    .child18{
        background-color: aqua;
    }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
        <div class="child6"></div>
        <div class="child7"></div>
        <div class="child8"></div>
        <div class="child9"></div>
        <div class="child10"></div>
        <div class="child11"></div>
        <div class="child12"></div>
        <div class="child13"></div>
        <div class="child14"></div>
        <div class="child15"></div>
        <div class="child16"></div>
        <div class="child17"></div>
        <div class="child18"></div>   
    </div>
</body>
</html>
