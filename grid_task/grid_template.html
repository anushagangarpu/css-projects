<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Task</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .parent{
           height: 100vh;
           display: grid;
           grid-template-columns: repeat(6,1fr);
           grid-template-rows: repeat(6,1fr);
           grid-template-areas:
           'img1 img2 img2 img2 img3 img4'
           'img5 img2 img2 img2 img6 img7'
           'img8 img9 img10 img11 img11 img11 '
           'img12 img13 img14 img11 img11 img11'
           'img15 img16 img16 img17 img18 img19'
           'img20 img16 img16 img21 img21 img21';
           gap: 5px;
        }
        .parent div{
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .parent div img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .img1{grid-area: img1;}
        .img2{grid-area: img2;}
        .img3{grid-area: img3;}
        .img4{grid-area: img4;}
        .img5{grid-area: img5;}
        .img6{grid-area: img6;}
        .img7{grid-area: img7;}
        .img8{grid-area: img8;}
        .img9{grid-area: img9;}
        .img10{grid-area: img10;}
        .img11{grid-area: img11;}
        .img12{grid-area: img12;}
        .img13{grid-area: img13;}
        .img14{grid-area: img14;}
        .img15{grid-area: img15;}
        .img16{grid-area: img16;}
        .img17{grid-area: img17;}
        .img18{grid-area: img18;}
        .img19{grid-area: img19;}
        .img20{grid-area: img20;}
        .img21{grid-area: img21;}
    </style>
</head>
<body>
    <div class="parent">
        <div class="img1"><img src="https://i0.wp.com/picjumbo.com/wp-content/uploads/beautiful-nature-mountain-scenery-with-flowers-free-photo.jpg?w=2210&quality=70" alt=""></div>
