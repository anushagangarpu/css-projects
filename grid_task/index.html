<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Task</title>
    <style>
    body{
        background-color: white;
    }
    .main{
        display: grid;
        grid-template-columns: repeat(3,1fr);
        gap: 20px;
        padding: 20px;
    }
    .box{
        background-color: black;
        padding: 15px;
        /* height: 250px; */
    }
    iframe{
        width: 100%;
        height: 100%;
        /* background-color: white; */
    }
    </style>
</head>
<body>
    <div class="main">
        <div class="box">
            <iframe src="grid1.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid2.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid3.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid4.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid5.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid6.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid7.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid8.html" frameborder="0"></iframe>
        </div>
        <div class="box">
            <iframe src="grid9.html" frameborder="0"></iframe>
        </div>
    </div>
</body>
</html>
